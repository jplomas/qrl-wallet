<template name="appTokenCreationResult">

<h4 class="text-lg font-semibold pageHeader">
  <i class="tags"></i>
  <div class="">
    Token Creation Result
  </div>
</h4>


<div id="transactionComplete" class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment">


  <h4 class="text-lg font-semibold divider">
    <i class="tags"></i>
    Token Details
  </h4>

  <div class="">
    <div class="">
      <div class="image">
        {{> QRCode text=transactionHash size="128px" color="#FFF"}}
      </div>
      <div style="color: #fff;" class="">
        {{#if isNFT}}
          {{#if verifiedProvider}}
          <i style="color: #fff;" class="certificate" title="Verified NFT Provider"></i>Verified NFT Provider - {{detailsNFT.name}}
          {{else}}
          <i style="color: #fff;" class="" title="Unverified NFT Provider"></i>Unverified NFT Provider (0x{{detailsNFT.id}})
          {{/if}}
        {{else}}
        <a class="text-lg font-semibold">{{tokenDetails.name}} ({{tokenDetails.symbol}})</a>
        {{/if}}
        <div class="meta">
          <span>Token Hash <a  id="confirmedTokenHash" class="badge badge-outline purple" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer" href="{{nodeExplorerUrl}}/tx/{{transactionHash}}">{{transactionHash}}</a></span>
        </div>
        <div class="description">
          <p></p>
        </div>
        <div style="color: #fff;" class="wordBreak extra">
          {{#if isNFT}}
            Creator: {{tokenDetails.owner}}<br />
            Provider ID: 0x{{detailsNFT.id}}<br />
            Hash: {{detailsNFT.hash}}<br />
          {{else}}
            Owner: {{tokenDetails.owner}}<br />
            Decimals: {{tokenDetails.decimals}}
          {{/if}}
        </div>
      </div>
    </div>
  </div>

  <h4 class="text-lg font-semibold divider">
    <i class="users"></i>
    {{#if isNFT}}
    Initial NFT Owner
    {{else}}
    Initial Token Holders
    {{/if}}
  </h4>

  <div class="">
  {{#each tokenHolders}}
    <div class="">
      <i style="color: #fff;" class="large user"></i>
      <div class="">
        <a class="text-lg font-semibold wordBreak">{{this.address}}</a>
        {{#if isNFT}}

        {{else}}
        <div class="description">{{tokenDetails.symbol}}: {{this.amount}}</div>
        {{/if}}
      </div>
    </div>
  {{/each}}
  </div>

  <h4 class="text-lg font-semibold divider">
    <i class="signal"></i>
    Transaction Status
  </h4>

  <div class="grid gap-4 grid-cols-1">
    <div class="">
      <p id="successMessage" style="word-wrap: break-word; word-break: break-all;">
        Success! Your token has been relayed into the QRL network through the following nodes, and is pending validation.
      </p>
    </div>
  </div>

  <div class="">
  {{#each transactionRelayedThrough}}
    <div class="">
      <span class="text-success">✔</span>
      <div class="">
        <div class="text-lg font-semibold">{{this}}</div>
      </div>
    </div>
  {{/each}}
  </div>

  <div id="relaying" class="alert gap-3">
    <br /><br />
    <span class="loading loading-spinner loading-md"></span>
    <div class="">
      <div id="loadingHeader" class="text-lg font-semibold">
        Just a moment
      </div>
      <p id="finalTxnStatus">Transaction Status: {{transactionStatus}}</p>
    </div>
  </div>

  <div class="grid gap-4 grid-cols-1">
    <div class="">
      <button class="btn btn-sm jsonclick">Raw Transaction Details <span aria-hidden="true">▾</span></button>
      <div class="rounded-xl border border-base-300 bg-base-100 p-4 raised jsonbox json unbreakable" style="display: none"></div>
    </div>
  </div>
  
</div>

</template>
