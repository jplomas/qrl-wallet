<template name="appTokenCreationConfirm">

<h4 class="text-lg font-semibold pageHeader">
  <i class="tags"></i>
  <div class="">
    Token Creation Confirmation
  </div>
</h4>

<div id="tokenCreationConfirmation" class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment">


  <h4 class="text-lg font-semibold divider">
    <i class="tags"></i>
    {{#if isNFT}}
    New NFT Details
    {{else}}
    New Token Details
    {{/if}}
  </h4>

  <div class="">
    <div class="">
      <div class="">
        <a style="color: #fff;" class="text-lg font-semibold">
        {{#if isNFT}}
        {{#if verifiedProvider}}
        <i style="color: #fff;" class="certificate" title="Verified NFT Provider"></i>Verified NFT Provider - {{detailsNFT.name}}
        {{else}}
        <i style="color: #fff;" class="" title="Unverified NFT Provider"></i>Unverified NFT Provider (0x{{detailsNFT.id}})
        {{/if}}
        {{else}}
          {{tokenCreationConfirmation.name}} ({{tokenCreationConfirmation.symbol}})
        {{/if}}
        </a>
        <div class="description">
          <p></p>
        </div>
        <div style="color: #fff;" class="extra wordBreak">
          {{#if isNFT}}
          Creator: {{#if bech32}}{{tokenCreationConfirmation.owner_b32}}{{else}}{{tokenCreationConfirmation.owner_hex}}{{/if}}<br />
          Provider ID: 0x{{detailsNFT.id}}<br />
          Hash: {{detailsNFT.hash}}<br />
          {{else}}
          Owner: {{#if bech32}}{{tokenCreationConfirmation.owner_b32}}{{else}}{{tokenCreationConfirmation.owner_hex}}{{/if}}<br />
          Decimals: {{tokenCreationConfirmation.decimals}}          
          {{/if}}
        </div>
      </div>
    </div>
  </div>


  <h4 class="text-lg font-semibold divider">
    <i class="users"></i>
    {{#if isNFT}}
    Initial NFT Owner
    {{else}}
    Initial Token Holders
    {{/if}}
  </h4>

  <div class="">
  {{#each tokenHolders}}
    <div class="">
      <i style="color: #fff;" class="large user"></i>
      <div class="">
        <a class="text-lg font-semibold wordBreak">{{#if bech32}}{{this.address_b32}}{{else}}{{this.address_hex}}{{/if}}</a>
        {{#if isNFT}}

        {{else}}
        <div class="description">{{tokenCreationConfirmation.symbol}}: {{this.amount}}</div>
        {{/if}}
      </div>
    </div>
  {{/each}}
  </div>



  <h4 class="text-lg font-semibold divider">
    <i class="file"></i>
    Transaction Details
  </h4>

  <div class="grid gap-4 grid-cols-1">
    <div class="">
      <span>From <a class="wordBreak">{{#if bech32}}{{tokenCreationConfirmation.from_b32}}{{else}}{{tokenCreationConfirmation.from_hex}}{{/if}}</a></span>
      <br />
      <span>Fee <a class="">{{tokenCreationConfirmation.fee}}</a></span>
      <br />
      <span>OTS Key Index <a class="">{{tokenCreationConfirmation.otsKey}}</a></span>
    </div>
  </div>


  <div class="grid gap-4 md:grid-cols-2">
    <div class="text-center">
      <button id="confirmToken" class="btn btn-lg btn-error">Confirm Token Creation</button>
    </div>
    <div class="text-center">
      <button id="cancelToken" class="btn btn-lg btn-error btn-outline">Cancel Token Creation</button>
    </div>
  </div>


  <div id="relaying" class="alert gap-3" style="display: none;">
    <br /><br />
    <span class="loading loading-spinner loading-md"></span>
    <div class="">
      <div class="text-lg font-semibold">
        Just a moment
      </div>
      <p id="tokenRelayingMsg">Your token is being relayed into the QRL network...</p>
    </div>
  </div>


</div>

<div id="transactionFailed" class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment" style="display: none;">
  <h4>Transaction Failed</h4>
  <p style="word-wrap: break-word; word-break: break-all;">
    Error! Your token has failed to relay into the QRL network.<br />
    Error message: {{transactionFailed}}
  </p>
</div>

</template>
