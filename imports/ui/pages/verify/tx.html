<template name="appVerifyTxid">
  {{#if isLoading}}
    <div class="card bg-base-200 border border-base-300 shadow-sm">
      <div class="card-body items-center text-center py-10">
        <span class="loading loading-spinner loading-lg text-primary"></span>
        <p class="text-base-content/70">Loading transaction details...</p>
      </div>
    </div>
  {{else if hasError}}
    <div class="card bg-base-200 border border-error/40 shadow-sm">
      <div class="card-body gap-4">
        <div class="flex items-center gap-3">
          <div class="bg-error/20 p-3 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-error" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M5.5 20h13a2 2 0 001.73-3l-6.5-11.5a2 2 0 00-3.46 0L3.77 17a2 2 0 001.73 3z" />
            </svg>
          </div>
          <h1 class="text-xl font-bold break-all">Transaction {{id}}</h1>
        </div>
        <div role="alert" class="alert alert-error">
          <span>Error reading transaction: {{error}}</span>
        </div>
      </div>
    </div>
  {{else if notFound}}
    <div class="card bg-base-200 border border-warning/40 shadow-sm">
      <div class="card-body gap-4">
        <div class="flex items-center gap-3">
          <div class="bg-warning/20 p-3 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-warning" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0m-8.485 8.485a8 8 0 1111.314 0" />
            </svg>
          </div>
          <h1 class="text-xl font-bold break-all">Transaction {{id}}</h1>
        </div>
        <div role="alert" class="alert alert-warning">
          <span>Transaction <span class="font-mono">{{id}}</span> not found</span>
        </div>
      </div>
    </div>
  {{else}}
    {{#with tx}}
        <!-- Hero header -->
        <div class="mb-6">
          <p class="text-xs font-semibold uppercase tracking-widest text-base-content/50 mb-2">Transaction</p>
          <div class="bg-base-200 border border-base-300 rounded-xl px-4 py-3 mb-4">
            <p class="font-mono text-sm break-all text-base-content/80">{{tx.tx.transaction_hash}}</p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            {{#if isConfirmed}}
              <span class="badge-pill badge-pill-confirmed">Confirmed</span>
            {{else}}
              <span class="badge-pill badge-pill-unconfirmed">Unconfirmed</span>
            {{/if}}
            <span class="badge-pill {{badgeClass}}">{{explorer.type}}{{#if isTokenTransfer}}: {{explorer.symbol}}{{/if}}</span>
            {{#if isConfirmed}}
              <span class="text-xs text-base-content/50">{{ts}}</span>
            {{/if}}
          </div>
        </div>

        <div class="card bg-base-200 border border-base-300 shadow-sm {{borderClass}}">
          <div class="card-body space-y-6">

            <!-- Type & Amount section -->
            <div class="bg-base-100/50 rounded-xl p-6 text-center">
              {{#if isNotMessage}}
                {{#if isToken}}
                  <p class="text-lg font-semibold">{{explorer.name}} ({{explorer.symbol}})</p>
                  <p class="text-sm text-base-content/50 mt-1">owned by</p>
                  <a class="link link-primary font-mono text-sm break-all" href="{{nodeExplorerUrl}}/a/{{#if bech32}}{{explorer.owner_b32}}{{else}}{{explorer.owner_hex}}{{/if}}" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer">
                    {{#if bech32}}{{explorer.owner_b32}}{{else}}{{explorer.owner_hex}}{{/if}}
                  </a>
                {{else}}
                  {{#if isTokenTransfer}}
                    <p class="text-4xl font-bold font-mono leading-none">{{explorer.totalTransferred}}</p>
                    <p class="text-sm text-base-content/60 mt-2">{{explorer.symbol}} ({{explorer.name}}) transferred</p>
                    <p class="text-xs text-base-content/40 mt-3">Token creation transaction</p>
                    <a href="{{nodeExplorerUrl}}/tx/{{explorer.token_txhash}}" class="link link-primary font-mono text-xs break-all" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer">{{explorer.token_txhash}}</a>
                  {{else}}
                    {{#if isMultiSigCreateTxn}}
                    {{else}}
                      <p class="text-4xl font-bold font-mono leading-none">{{tx.tx.amount}}</p>
                      <p class="text-sm text-base-content/60 mt-2">Quanta</p>
                      {{#if hasUsdAmount}}
                        <p class="text-xs text-base-content/40 mt-1">USD ${{usdAmount}}</p>
                      {{/if}}
                    {{/if}}
                  {{/if}}
                {{/if}}
              {{/if}}
            </div>

            <!-- From section -->
          {{#if isToken}}
            <div class="bg-base-100/50 rounded-xl p-4">
              <h3 class="text-sm font-semibold uppercase tracking-wider text-base-content/50 mb-3">Initial Balances</h3>
              <div class="overflow-x-auto">
                <table class="table table-zebra w-full table-sm">
                  <thead>
                    <tr>
                      <th>Address</th>
                      <th>Balance</th>
                    </tr>
                  </thead>
                  <tbody>
                    {{#each explorer.initialBalances}}
                      <tr>
                        <td class="font-mono break-all">
                          <a class="link link-primary break-all" href="{{nodeExplorerUrl}}/a/{{#if bech32}}{{this.address_b32}}{{else}}{{this.address_hex}}{{/if}}" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer">
                            {{#if bech32}}{{this.address_b32}}{{else}}{{this.address_hex}}{{/if}}
                          </a>
                        </td>
                        <td>{{this.amount}}</td>
                      </tr>
                    {{/each}}
                  </tbody>
                </table>
              </div>
            </div>
          {{else}}
            {{#if isNotCoinbase}}
              <div class="bg-base-100/50 rounded-xl p-4">
                <h3 class="flex items-center gap-2 text-sm font-semibold uppercase tracking-wider text-base-content/50 mb-3">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-error" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 13l-5 5m0 0l-5-5m5 5V6" /></svg>
                  From
                </h3>
                <div class="overflow-x-auto">
                  <table class="table w-full table-sm">
                    <tbody>
                      <tr>
                        <td class="font-mono break-all">
                          <a class="link link-primary break-all" href="{{nodeExplorerUrl}}/a/{{#if bech32}}{{explorer.from_b32}}{{else}}{{explorer.from_hex}}{{/if}}" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer">
                            {{#if bech32}}{{explorer.from_b32}}{{else}}{{explorer.from_hex}}{{/if}}
                          </a>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            {{/if}}

            {{#if isMessage}}
              <div class="bg-base-100/50 rounded-xl p-4">
                <h3 class="text-sm font-semibold uppercase tracking-wider text-base-content/50 mb-3">Message</h3>
                <pre class="bg-base-200 border border-base-300 rounded-lg p-4 whitespace-pre-wrap break-all text-sm">{{explorer.message}}</pre>
              </div>
            {{else}}
              {{#if isDocumentNotarisation}}
                <div class="bg-base-100/50 rounded-xl p-4 space-y-2">
                  <h3 class="text-sm font-semibold uppercase tracking-wider text-base-content/50 mb-3">Document Notarisation</h3>
                  <div class="grid gap-2 text-sm">
                    <p><span class="text-base-content/50">Notary:</span> <span class="font-mono break-all">{{#if bech32}}{{explorer.from_b32}}{{else}}{{explorer.from_hex}}{{/if}}</span></p>
                    <p><span class="text-base-content/50">Hash Function:</span> <span class="font-mono">{{explorer.hash_function}}</span></p>
                    <p><span class="text-base-content/50">File Hash:</span> <span class="font-mono break-all">{{explorer.hash}}</span></p>
                    <p><span class="text-base-content/50">Additional Text:</span> <span class="font-mono break-all">{{explorer.text}}</span></p>
                  </div>
                </div>
              {{else}}
                {{#if isMultiSigCreateTxn}}
                  <div class="bg-base-100/50 rounded-xl p-4">
                    <h3 class="text-sm font-semibold uppercase tracking-wider text-base-content/50 mb-3">Signatories</h3>
                    <div class="overflow-x-auto">
                      <table class="table table-zebra w-full table-sm">
                        <thead>
                          <tr>
                            <th>Address</th>
                            <th>Weight</th>
                          </tr>
                        </thead>
                        <tbody>
                          {{#each multiSigSignatories this.tx.multi_sig_create}}
                            <tr>
                              <td class="font-mono break-all">{{this.address_hex}}</td>
                              <td>{{this.weight}}</td>
                            </tr>
                          {{/each}}
                        </tbody>
                        <tfoot>
                          <tr>
                            <th>Threshold for spend</th>
                            <th>{{this.tx.multi_sig_create.threshold}}</th>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  </div>
                {{else}}
                  {{#if isMultiSigVoteTxn}}
                    <div class="bg-base-100/50 rounded-xl p-4">
                      <h3 class="text-sm font-semibold uppercase tracking-wider text-base-content/50 mb-3">Vote Details</h3>
                      <div class="overflow-x-auto">
                        <table class="table w-full table-sm">
                          <tbody>
                            <tr>
                              <td class="text-base-content/50">Spend transaction</td>
                              <td class="font-mono break-all"><a class="link link-primary break-all" href="/tx/{{this.tx.multi_sig_vote.shared_key}}">{{this.tx.multi_sig_vote.shared_key}}</a></td>
                            </tr>
                            <tr>
                              <td class="text-base-content/50">Vote status</td>
                              <td>{{#if this.tx.multi_sig_vote.unvote}}Approval revoked{{else}}Transaction approved{{/if}}</td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>
                  {{else}}
                    <!-- To section -->
                    <div class="bg-base-100/50 rounded-xl p-4">
                      <h3 class="flex items-center gap-2 text-sm font-semibold uppercase tracking-wider text-base-content/50 mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-success" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11l5-5m0 0l5 5m-5-5v12" /></svg>
                        To
                      </h3>
                      <div class="overflow-x-auto">
                        <table class="table w-full table-sm">
                          <thead>
                            <tr>
                              <th>Address</th>
                              <th>Amount</th>
                            </tr>
                          </thead>
                          <tbody>
                            {{#if isTransfer}}
                              {{#each explorer.outputs}}
                                <tr>
                                  <td class="font-mono break-all">
                                    <a class="link link-primary break-all" href="{{nodeExplorerUrl}}/a/{{#if bech32}}{{this.address_b32}}{{else}}{{this.address_hex}}{{/if}}" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer">
                                      {{#if bech32}}{{this.address_b32}}{{else}}{{this.address_hex}}{{/if}}
                                    </a>
                                  </td>
                                  <td>{{this.amount}}</td>
                                </tr>
                              {{/each}}
                            {{else if isTokenTransfer}}
                              {{#each explorer.outputs}}
                                <tr>
                                  <td class="font-mono break-all">
                                    <a class="link link-primary break-all" href="{{nodeExplorerUrl}}/a/{{#if bech32}}{{this.address_b32}}{{else}}{{this.address_hex}}{{/if}}" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer">
                                      {{#if bech32}}{{this.address_b32}}{{else}}{{this.address_hex}}{{/if}}
                                    </a>
                                  </td>
                                  <td>{{this.amount}}</td>
                                </tr>
                              {{/each}}
                            {{else}}
                              <tr>
                                <td class="font-mono break-all">
                                  <a class="link link-primary break-all" href="{{nodeExplorerUrl}}/a/{{#if bech32}}{{explorer.to_b32}}{{else}}{{explorer.to_hex}}{{/if}}" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer">
                                    {{#if bech32}}{{explorer.to_b32}}{{else}}{{explorer.to_hex}}{{/if}}
                                  </a>
                                </td>
                                <td>{{tx.tx.amount}}</td>
                              </tr>
                            {{/if}}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  {{/if}}
                {{/if}}
              {{/if}}
            {{/if}}
          {{/if}}

          {{#if hasMessage}}
            <div class="bg-base-100/50 rounded-xl p-4">
              <h3 class="text-sm font-semibold uppercase tracking-wider text-base-content/50 mb-3">Message</h3>
              <div class="bg-base-200 border border-base-300 rounded-lg p-4 font-mono text-sm break-all">{{tfMessage}}</div>
            </div>
          {{/if}}

          <!-- Metadata grid -->
          <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
            <div class="bg-base-100/50 rounded-lg p-3">
              <p class="text-xs text-base-content/40 uppercase tracking-wider mb-1">Confirmations</p>
              <p class="font-mono text-sm">{{#if isConfirmed}}{{confirmations}}{{else}}Unconfirmed{{/if}}</p>
            </div>
            <div class="bg-base-100/50 rounded-lg p-3">
              <p class="text-xs text-base-content/40 uppercase tracking-wider mb-1">Block</p>
              <p class="font-mono text-sm"><a class="link link-primary" href="{{nodeExplorerUrl}}/block/{{tx.header.block_number}}" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer">{{tx.header.block_number}}</a></p>
            </div>
            <div class="bg-base-100/50 rounded-lg p-3">
              <p class="text-xs text-base-content/40 uppercase tracking-wider mb-1">Nonce</p>
              <p class="font-mono text-sm">{{tx.tx.nonce}}</p>
            </div>
            <div class="bg-base-100/50 rounded-lg p-3">
              <p class="text-xs text-base-content/40 uppercase tracking-wider mb-1">OTS Key</p>
              <p class="font-mono text-sm">{{tx.tx.ots_key}}</p>
            </div>
            <div class="bg-base-100/50 rounded-lg p-3">
              <p class="text-xs text-base-content/40 uppercase tracking-wider mb-1">Fee</p>
              <p class="font-mono text-sm">{{tx.tx.fee}} Quanta</p>
            </div>
            <div class="bg-base-100/50 rounded-lg p-3">
              <p class="text-xs text-base-content/40 uppercase tracking-wider mb-1">Status</p>
              <p class="font-mono text-sm">{{#if isConfirmed}}Confirmed{{else}}Unconfirmed{{/if}}</p>
            </div>
          </div>

          {{#if explorerTransactionUrl}}
            <div class="pt-2">
              <a
                class="btn btn-sm btn-outline"
                href="{{explorerTransactionUrl}}"
                target="_blank"
                rel="noopener noreferrer nofollow"
                referrerpolicy="no-referrer"
              >
                View on Explorer
              </a>
            </div>
          {{/if}}
        </div>
      </div>
    {{/with}}
  {{/if}}
</template>
