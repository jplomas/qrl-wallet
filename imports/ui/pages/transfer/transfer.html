<template name="appTransfer">

<dialog class="modal" id="verifyLedgerNanoAddressModal">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">Ledger Nano S Address Verification</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div>
            <div class="text-lg font-semibold">
              The address below should be displayed on your Ledger Nano S device.
            </div>
            <p class="wordBreak"><strong>Address:</strong> {{transferFrom.address}}</p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-error">Close</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="cancelTransactionGenerationWarning">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">Whoa there buddy!!</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              Are you sure?
            </div>
            <p>Please confirm you wish to cancel generating this transaction.</p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">Yes, cancel this transaction!</button>
        <button type="button" class="btn btn-error btn-outline">Cancel</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="cancelWaitingForTransactionWarning">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">Whoa there buddy!!</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              Are you sure?
            </div>
            <p>This transaction has not been confirmed on the network just yet! Leaving this page now may show incorrect balances on other pages. It is advised that you wait for the transaction to confirm before leaving this page.</p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">I understand, leave now anyway.</button>
        <button type="button" class="btn btn-error btn-outline">Cancel</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="lowOtsKeyWarning">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">OTS Keys Running Low!</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              Warning: Your OTS Keys are running low.
            </div>
            <p>You only have <strong>{{otsKeysRemaining}}</strong> OTS Keys remaining. When you have used all of these, you will no longer be able to send QRL or Tokens from this wallet.</p>
            <p>It is strongly suggested that you create a new wallet, and move all your QRL and Tokens to it to ensure you do not lose access to your funds.</p>
            <p><a href="https://docs.theqrl.org/developers/ots/" target="_blank">Click here to learn what OTS Keys are.</a></p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">Okay</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="zeroBytesAddressWarning">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">You are using a test address!</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              Warning: Never send mainnet Quanta to this address!
            </div>
            <p>The address you have opened is used for testing Ledger Nano devices, and is not securely seeded. Do not use this address to store or transact with any Quanta.</p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">I understand, I won't use this address!</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="invalidAddress0x">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">Invalid Address</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              You have attempted to create a transaction to an Ethereum ERC20 address starting with <strong>0x</strong>.
              <br /><br />
              This is not possible from the QRL Network. You can only send to addresses that start with a <strong>Q</strong>.
              <br /><br />
              Some exchanges still list our ERC20 token, and will provide an <strong>0x</strong> deposit address that is only compatible with the legacy QRL ERC20 token.
              <br /><br />
              Please keep this in mind when attempting to transfer your Quanta around.
            </div>
            <p></p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">Okay</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="otsKeyReuseDetected">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">OTS Key Reuse</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              You have attempted to create a transaction using an OTS Key Index that has previously been used on the QRL Network.
              <br /><br />
              Please recreate your transaction using a unique OTS Key Index.
            </div>
            <p></p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">Okay</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="ledgerOtsKeyReuseDetected">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">OTS Key Reuse</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              You have attempted to create a transaction using an OTS Key Index that has previously been used on the QRL Network.
              <br /><br />
              You need to update your Ledgers XMSS Index in Tools -> Set XMSS Index.
            </div>
            <p></p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">Okay</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="maxThreeRecipientsLedger">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">Max of 3 Recipients</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              Ledger Nanos can only sign up to three recipients per transaction.
              <br /><br />
              Please remove some recipients so that you only have up to three per transaction.
            </div>
            <p></p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">Okay</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="maxRecipientsReached">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">Max of 3 Recipients</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              Ledger Nanos can only sign up to three recipients per transaction.
              <br /><br />
              You cannot add any more recipients to this transaction.
            </div>
            <p></p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">Okay</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="invalidNodeResponse">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">WARNING - Bad Response</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              WARNING - The node you've requested this transaction from replied with bad data that doesn't match your intended transaction parameters.
              <br /><br />
              This transaction has been cancelled automatically to protect your funds.
              <br /><br />
              Please report this issue through a Github issue, or directly to the QRL Team via email: info@theqrl.org
            </div>
            <p></p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">Okay</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="ledgerNotSupported">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">Ledger Not Supported</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              Ledger Nano not Supported for Tokens
            </div>
            <p>Sorry, Ledger Nano support for Token Creation and Token Transfers is still being developed and tested. We will enable this functionality at a later stage.</p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">Okay</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<dialog class="modal" id="ledgerConfirmationModal">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">Send {{transactionConfirmationAmount}} Quanta?</div>
      <div class="">
        <div class="grid gap-4">
          <div class="">
            <img class="svg" src="/img/ledger-nano.svg" />
          </div>
          <div class="">
            <div class="description pl-10">
              <p>Your transaction requires confirmation on your Ledger Nano S device. Check the details on the Ledger match those displayed below then click the sign option on your device:</p>
              <div class="container">
                <table class="table table-zebra w-full">
                  <tr>
                    <td>
                      <div class="badge badge-outline fw">FROM</div>
                    </td>
                    <td class="no-wrap">{{transferFrom.address}}</td>
                  </tr>
                  <tr>
                    <td>
                      <div class="badge badge-outline fw">TO</div>
                    </td>
                    <td class="no-wrap">
                      {{#each transactionConfirmation.outputs}}
                        {{this.amount}} {{this.name}} -> {{# if bech32}}{{this.address_b32}}{{else}}{{this.address_hex}}{{/if}}<br /><br />
                      {{/each}}
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <div class="badge badge-outline fw">TOTAL</div>
                    </td>
                    <td class="no-wrap">{{transactionConfirmationAmount}} Quanta</td>
                  </tr>
                  <tr>
                    <td>
                      <div class="badge badge-outline fw">FEE</div>
                    </td>
                    <td class="no-wrap">{{transactionConfirmationFee}} Quanta</td>
                  </tr>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <div id="awaitingLedgerConfirmation" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content">
          <h3>Awaiting confirmation on Ledger device
            <div class="loading loading-spinner inline-block"></div>
          </h3>
        </div>

        <div id="signOnLedgerRejected" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content" style="display: none;">
          <h3>The Transaction has been rejected on Ledger device</h3>
          <h3 id="noRemainingSignatures" style="display: none;">There are no remaining signatures to sign a transaction with!</h3>
        </div>

        <div id="signOnLedgerTimeout" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content" style="display: none;">
          <h3>Timed out waiting for response from Ledger Nano. To save an OTS Key, you should reject the transaction on your Ledger and try again.</h3>
        </div>

        <div id="signOnLedgerError" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content" style="display: none;">
          <h3>Error communicating with Ledger Nano. To save an OTS Key, you should reject the transaction on your Ledger and try again.</h3>
        </div>

        <p id="ledgerHasConfirmed" style="display:none;">Transaction signed on Ledger <span class="text-success">✔</span></p>

        <button type="button" class="btn btn-success confirm" id="relayLedgerTxnButton" style="display:none;">Send transaction</button>
        <button type="button" class="btn btn-error">Cancel</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

{{> recoverySeedModal }}

<!-- Page Header -->
<div class="flex items-center gap-3 mb-6">
  <div class="bg-primary/20 p-3 rounded-lg">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
    </svg>
  </div>
  <h1 class="text-2xl font-bold text-base-content">Transfer</h1>
</div>

<div class="text-left" id="transferForm">
  <div class="grid gap-4 md:grid-cols-2">
    <div class="">

      <!-- Send/Receive Section -->
      <div id="sendReceiveTabs" class="tabs tabs-boxed w-full bg-base-200/70 p-1">
        <a class="tab tab-active flex-1" data-tab="send">Send</a>
        <a class="tab flex-1" data-tab="receive">Receive</a>
        <a class="tab flex-1" data-tab="tokenBalances">Tokens</a>
        <a class="tab flex-1" data-tab="nftBalances">NFTs</a>
      </div>
      <div class="card-gradient transfer-tab-panel p-4 block" data-tab="send">

        <!-- Generate Transaction Area -->
        <div id="generateTransactionArea">
          <form id="generateTransactionForm" class="space-y-4">

            <div id="transferRecipients">
              <div>
                <div class="space-y-2 field">
                  <div class="flex items-center justify-between gap-3">
                    <label class="fieldset-legend m-0">Recipient</label>
                    <button id="showMessageField" type="button" class="link link-primary text-sm">Add message</button>
                  </div>
                  <input type="text" id="to_1" name="to[]" placeholder="Recipient Address" autocomplete="off" class="input input-bordered w-full bg-base-100" />
                </div>
                <div class="space-y-2 field" style="display: none;" id="messageField">
                  <div class="flex items-center justify-between gap-3">
                    <label class="fieldset-legend m-0">Message</label>
                    <button id="clearMessageField" type="button" class="link link-primary text-sm">Remove message</button>
                  </div>
                  <input type="text" id="message" name="message" placeholder="Message (max 80 bytes)" autocomplete="off" class="input input-bordered w-full bg-base-100" />
                </div>
                <fieldset class="fieldset w-full field">
                  <legend class="fieldset-legend">Amount</legend>
                  <div class="join w-full" id="amountFields">
                    <input type="text" id="amounts_1" name="amounts[]" autocomplete="off" class="input input-bordered join-item w-full bg-base-100" />
                    <select id="amountType" class="select select-bordered join-item bg-base-100 w-48 max-w-[48%]">
                      <option value="quanta">Quanta</option>
                      {{#each tokensHeld}}
                      {{#if heldTokenIsNFT}}
                      <option value="token-{{this.hash}}-{{this.decimals}}">NFT ({{this.shortHash}})</option>
                      {{else}}
                      <option value="token-{{this.hash}}-{{this.decimals}}">{{this.symbol}} ({{this.shortHash}})</option>
                      {{/if}}
                      {{/each}}
                    </select>
                  </div>
                  <p class="label">Balance: {{balanceAmount}} {{balanceSymbol}}</p>
                </fieldset>
              </div>

            </div>

            <!-- Additional Recipients -->
            <div class="space-y-2">
              <button id="addTransferRecipient" type="button" class="btn btn-secondary btn-sm" style="width: 100%">
                <span aria-hidden="true">＋</span>
                Add Another Recipient
              </button>
            </div>

            <fieldset class="fieldset w-full field">
              <legend class="fieldset-legend">Fee (In Quanta)</legend>
              <input type="text" id="fee" value="0.001" autocomplete="off" class="input input-bordered w-full bg-base-100" />
            </fieldset>
            <fieldset class="fieldset w-full field">
              <legend class="fieldset-legend">OTS Key Index</legend>
              <input type="text" id="otsKey" placeholder="0" value="{{otsKeyEstimate}}" autocomplete="off" class="input input-bordered w-full bg-base-100" {{ledgerWalletDisabled}}>
            </fieldset>


            <div class="space-y-2">
              <div class="alert alert-warning gap-3" style="display: inline-flex;"> <div class="">
                  <div class="text-lg font-semibold">
                    OTS Key Index Warning
                  </div>
                  {{#if isLedgerWallet}}
                  <p>The <strong>OTS (One Time Signature)</strong> Key Index in the field above is based on data provided by your Ledger Device. You should <b>never</b> re-use the same OTS Key for more than 1 transaction. As you are using a Ledger Device, you can rest assured your Device will keep track of all used signatures for you. As a result, you cannot change the OTS Key that will be used to sign this transaction as the Ledger Device will automatically use the next one in line.</p>
                  {{else}}
                  <p>The <strong>OTS (One Time Signature)</strong> Key Index in the field above is estimated based on data provided by the QRL node you're connected to. You should <b>never</b> re-use the same OTS Key for more than 1 transaction. If you are unsure, it is safest to write down all used OTS Key Indexes, and store them in a safe place.</p>
                  {{/if}}
                </div>
              </div>
            </div>

            <div class="grid gap-4 grid-cols-1">
              <div class="text-center">
                <button id="generateTransaction" class="btn btn-md btn-success gap-2" style="width: 100%">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                  </svg>
                  Confirm
                </button>
              </div>
            </div>

            <div id="generating" class="alert gap-3" style="display: none;">
              <br /><br />
              <span class="loading loading-spinner loading-md"></span>
              <div class="">
                <div class="text-lg font-semibold">
                  Just a moment
                </div>
                <p>Generating transaction...</p>
              </div>
            </div>
          </form>
        </div>


        <!-- Confirm Transaction Area -->
        <div id="confirmTransactionArea" style="display: none;">

          <div class="alert gap-3 transactionRecord">
            <span class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-full border border-primary/35 bg-primary/15 text-primary"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17L17 7M17 7H9M17 7V15" /></svg></span>
            <div class="">
              <div class="text-lg font-semibold">
                Confirm Send
              </div>
            </div>
            <div class="floatright">
              {{transactionConfirmationAmount}} Quanta
            </div>
          </div>
          {{#if includesMessage}}
          <form>
            <div class="space-y-2">
              <label>Message</label>
              <div class="alert visible">
                {{messageText}}
              </div>
            </div>
          </form>
          <p>&nbsp;</p>
          {{/if}}
          <form>
            <div class="space-y-2">
              <label>Recipients</label>
              <div class="alert visible">
                <p class="wordBreak">
                  {{#each transactionConfirmation.outputs}}
                    {{this.amount}} {{this.name}} -> {{# if bech32}}{{this.address_b32}}{{else}}{{this.address_hex}}{{/if}}<br /><br />
                  {{/each}}
                </p>
              </div>
            </div>

          </form>

          <h4 class="text-lg font-semibold divider">
            <i class="file"></i>
            Transaction Details
          </h4>

          <div class="grid gap-4 grid-cols-1">
            <div class="">
              <span>Fee <a class="">{{transactionConfirmationFee}}</a> Quanta</span>
              <br />
              <span>OTS Key Index <a class="">{{transactionConfirmation.otsKey}}</a></span>
            </div>
          </div>

            <div class="grid gap-4 grid-cols-1">
              <div class="text-center">
              <button id="confirmTransaction" class="btn btn-md btn-success gap-2"  style="width: 100%">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                {{#if isSeedWallet}}
                  Click to Send
                {{else}}
                  Sign with Ledger
                {{/if}}
              </button>
            </div>
          </div>

          <div id="relaying" class="alert gap-3" style="display: none;">
            <br /><br />
            <span class="loading loading-spinner loading-md"></span>
            <div class="">
              <div class="text-lg font-semibold">
                Just a moment
              </div>
              <p id="transferRelayingMsg">Your transaction is being relayed into the QRL network...</p>
            </div>
          </div>
        </div>


        <!-- Confirm Token Transaction Area -->
        <div id="confirmTokenTransactionArea" style="display: none;">
          <div class="alert gap-3 transactionRecord">
            <span class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-full border border-primary/35 bg-primary/15 text-primary"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17L17 7M17 7H9M17 7V15" /></svg></span>
            <div class="">
              <div class="text-lg font-semibold">
                Confirm Send
              </div>
            </div>
            <div class="floatright">
              {{tokenTransferConfirmationAmount}} {{#if confirmationForNFT}}NFT{{else}}{{tokenDetails.symbol}}{{/if}}
            </div>
          </div>

          <form>
            <div class="space-y-2">
              <label>Recipient(s)</label>
              <div class="alert visible">
                <p class="wordBreak">
                  {{#each tokenTransferConfirmation.outputs}}
                    {{this.amount}} {{#if confirmationForNFT}}NFT{{else}}{{this.name}}{{/if}} -> {{# if bech32}}{{this.address_b32}}{{else}}{{this.address_hex}}{{/if}}<br /><br />
                  {{/each}}
                </p>
              </div>
            </div>
          </form>

          <h4 class="text-lg font-semibold divider">
            <i class="file"></i>
            Transaction Details
          </h4>

          <div class="grid gap-4 grid-cols-1">
            <div class="">
              <span>Token Hash <a class="wordBreak" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer" href="{{nodeExplorerUrl}}/tx/{{tokenTransferConfirmation.tokenHash}}">{{tokenTransferConfirmation.tokenHash}}</a></span>
              <br />
              <span>Fee <a class="">{{tokenTransferConfirmation.fee}}</a> Quanta</span>
              <br />
              <span>OTS Key Index <a class="">{{tokenTransferConfirmation.otsKey}}</a></span>
            </div>
          </div>

          <br />
          <div class="space-y-2">
            <div class="alert alert-warning gap-3" style="display: inline-flex;"> <div class="">
                <div class="text-lg font-semibold">
                  Check the Token Hash!
                </div>
                <p>Please ensure the token hash above is correct before proceeding with this transaction!</p>
              </div>
            </div>
          </div>
          <br />

          <div class="grid gap-4 grid-cols-1">
            <div class="text-center">
              <button id="confirmTokenTransaction" class="btn btn-md btn-success gap-2"  style="width: 100%">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>

          {{#if isSpendMultiSigTxn this.tx.transactionType}}
          <div class="alert gap-3 transactionRecord cursor-pointer shadow-sm border-type-multisig" data-txhash="{{this.tx.transaction_hash}}">
            <span class="tx-direction-icon tx-icon-multisig"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" /></svg></span>
            <div class="">
              <div class="transactionTitle">
                Multisig Spend
                <span class="transactionTimestamp">{{this.timestamp}}</span>
              </div>
              <p class="transactionAddress">
                {{this.tx.transaction_hash}}
              </p>
            </div>
            <div class="floatright">
              <a class="txValueLink" href="/verify-txid/{{this.tx.transaction_hash}}">View Transaction</a>
            </div>
          </div>
          {{/if}}

          {{#if isVoteMultiSigTxn this.tx.transactionType}}
          <div class="alert gap-3 transactionRecord cursor-pointer shadow-sm border-type-multisig" data-txhash="{{this.tx.transaction_hash}}">
            <span class="tx-direction-icon tx-icon-multisig"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" /></svg></span>
            <div class="">
              <div class="transactionTitle">
                Multisig Vote
                <span class="transactionTimestamp">{{this.timestamp}}</span>
              </div>
              <p class="transactionAddress">
                {{this.tx.transaction_hash}}
              </p>
            </div>
            <div class="floatright">
              <a class="txValueLink" href="/verify-txid/{{this.tx.transaction_hash}}">View Transaction</a>
            </div>
          </div>
          {{/if}}

          {{#if isMessageTxn this.tx.transactionType}}
          <div class="alert gap-3 transactionRecord cursor-pointer shadow-sm border-type-message" data-txhash="{{this.tx.transaction_hash}}">
            <span class="tx-direction-icon tx-icon-message"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg></span>
            <div class="">
              <div class="transactionTitle">
                Message
                <span class="transactionTimestamp">{{this.timestamp}}</span>
              </div>
              <p class="transactionAddress">
                {{this.tx.transaction_hash}}
              </p>
            </div>
            <div class="floatright">
              <a class="txValueLink" href="/verify-txid/{{this.tx.transaction_hash}}">View Transaction</a>
            </div>
          </div>
          {{/if}}

          {{#if isDocumentNotarisation this.tx.transactionType}}
          <div class="alert gap-3 transactionRecord cursor-pointer shadow-sm border-type-message" data-txhash="{{this.tx.transaction_hash}}">
            <span class="tx-direction-icon tx-icon-message"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg></span>
            <div class="">
              <div class="transactionTitle">
                Document Notarisation
                <span class="transactionTimestamp">{{this.timestamp}}</span>
              </div>
              <p class="transactionAddress">
                {{this.tx.transaction_hash}}
              </p>
            </div>
            <div class="floatright">
              <a class="txValueLink" href="/verify-txid/{{this.tx.transaction_hash}}">View Transaction</a>
            </div>
          </div>
          {{/if}}

        {{/each}}

        {{#if pagination}}
        <table class="table table-zebra w-full striped">
          <tfoot>
              <tr><th colspan="7">
                <div class="grid gap-4">
                  <div class="">
                <div class="labeled fluid input">
                  <label for="paginator" class="badge badge-outline">Page </label>
                  <input type="text" placeholder="{{currentPage}}" id="paginator">
                  <div class="badge badge-outline"> of {{totalPages}}</div>
                </div>
              </div>
              <div class="row">
                <div class="floated pagination">
                  {{#if pback}}
                  <a qrl-data="back" class="">
                    <i qrl-data="back" class="chevron"></i>
                  </a>
                  {{/if}}
                  {{#each pages}}
                  <a class="{{isActive}}">{{this.number}}</a>
                  {{/each}}
                  {{#if pforward}}
                  <a qrl-data="forward" class="">
                    <i qrl-data="forward" class="chevron"></i>
                  </a>
                  {{/if}}
                </div>
              </div>
            </div>
              </th>
            </tr>
          </tfoot>
        </table>
        {{/if}}

      {{else}}
        <div id="noTransactionsFound" style="display: none;" class="alert gap-3">
          <br /><br />
          <div class="">
            <div class="text-lg font-semibold">
              No transactions found
            </div>
          </div>
        </div>
      {{/if}}

      {{#if openedAddress}}
      <div class="mt-4">
        <a
          class="btn btn-secondary btn-sm w-full"
          href="{{nodeExplorerUrl}}/a/{{openedAddress}}"
          target="_blank"
          rel="noopener noreferrer nofollow"
          referrerpolicy="no-referrer"
        >
          View Address on Explorer
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </a>
      </div>
      {{/if}}
    </div>
  </div>
</div>

<div id="transactionGenFailed" class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment" style="display: none;">
  <h4>Transaction Generation Failed</h4>
  <p style="word-wrap: break-word; word-break: break-all;">Error: {{transactionGenerationError}}</p>
</div>

</template>

<template name="recoverySeedModal">
  <dialog class="modal" id="recoverySeedModal">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">Wallet Recovery Seed</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div>
            <div class="text-lg font-semibold">
              Warning: Keep this information private at all times!
            </div>
            <p class="break-words text-sm"><strong>Mnemonic Phrase:</strong> {{recoverySeed.mnemonic}}</p>
            <p class="break-all font-mono text-sm"><strong>Hexseed:</strong> {{recoverySeed.hexseed}}</p>
            <p class="wordBreak"><strong>Private key QR:</strong><div id="recQR" width="150" height="150"></div>
            </p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-error">Close</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
</template>
