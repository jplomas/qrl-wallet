<template name="appAddressClose">

<!-- Page Header -->
<div class="flex items-center gap-3 mb-6">
  <div class="bg-base-300 p-3 rounded-lg">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-base-content" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
    </svg>
  </div>
  <h1 class="text-2xl font-bold text-base-content">Wallet Closed</h1>
</div>

<!-- Main Card -->
<div class="card-gradient">
  <div class="card-body items-center text-center py-16">
    <div class="bg-base-300 p-8 rounded-full mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-base-content/50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
      </svg>
    </div>
    <h2 class="text-xl font-semibold text-base-content/70">Your wallet has been securely closed</h2>
    <p class="text-base-content/50 mt-2">You can open your wallet again at any time.</p>
    <div class="card-actions mt-6">
      <a href="/open" class="btn btn-primary gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" />
        </svg>
        Open Wallet
      </a>
    </div>
  </div>
</div>

<!-- Ledger Error Modal -->
<dialog class="modal" id="closedWithError">
  <div class="modal-box wallet-modal-box">
    <h3 class="font-bold text-lg">Ledger XMSS Tree Changed</h3>
    <div role="alert" class="alert alert-warning mt-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      <p>The XMSS tree on the Ledger device has changed. Please re-open the wallet to use functions for this XMSS tree.</p>
    </div>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-success">OK</button>
      </form>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

</template>
