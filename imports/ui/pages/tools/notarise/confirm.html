<template name="appNotariseConfirm">

<div class="hidden fixed inset-0 z-50 items-center justify-center bg-black/60 p-4 overflow-y-auto" id="ledgerConfirmationModal">
  <div class="text-lg font-semibold">Send Document Notarisation Transaction?</div>
  <div class="">
    <div class="grid gap-4">
      <div class="">
        <img class="svg" src="/img/ledger-nano.svg" />
      </div>
      <div class="">
        <div class="description pl-10">
          <p>Your transaction requires confirmation on your Ledger Nano S device. Check the details on the Ledger match those displayed below then click the sign option on your device:</p>
          <div class="container">
            <table class="table table-zebra w-full">
              <tr>
                <td>
                  <div class="badge badge-outline fw">FROM</div>
                </td>
                <td class="no-wrap">{{transferFrom.address}}</td>
              </tr>
              <tr>
                <td>
                  <div class="badge badge-outline fw">MESSAGE</div>
                </td>
                <td class="no-wrap">
                  {{ledgerVerificationMessage}}
                </td>
              </tr>
              <tr>
                <td>
                  <div class="badge badge-outline fw">FEE</div>
                </td>
                <td class="no-wrap">{{notariseCreationConfirmation.fee}} Quanta</td>
              </tr>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="mt-4 flex flex-wrap justify-end gap-2 border-t border-base-300 pt-3">
    <div id="awaitingLedgerConfirmation" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content">
      <h3>Awaiting confirmation on Ledger device
        <div class="loading loading-spinner inline-block"></div>
      </h3>
    </div>

    <div id="signOnLedgerRejected" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content" style="display: none;">
      <h3>The Transaction has been rejected on Ledger device</h3>
      <h3 id="noRemainingSignatures" style="display: none;">There are no remaining signatures to sign a transaction with!</h3>
    </div>

    <div id="signOnLedgerTimeout" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content" style="display: none;">
      <h3>Timed out waiting for response from Ledger Nano. To save an OTS Key, you should reject the transaction on your Ledger and try again.</h3>
    </div>

    <div id="signOnLedgerError" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content" style="display: none;">
      <h3>Error communicating with Ledger Nano. To save an OTS Key, you should reject the transaction on your Ledger and try again.</h3>
    </div>

    <p id="ledgerHasConfirmed" style="display:none;">Transaction signed on Ledger <span class="text-success">✔</span></p>

    <div class="btn btn-success confirm" id="relayLedgerTxnButton" style="display:none;">Send transaction</div>
    <div class="btn btn-error">Cancel</div>
  </div>
</div>

<h2 class="text-lg font-semibold pageHeader">
  <i class="edit"></i>
  <div class="">
    Document Notarisation
  </div>
</h2>

<div id="notariseCreationConfirmation" class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment">

  <h4 class="text-lg font-semibold divider">
    <i class="edit"></i>
    Notarisation Details
  </h4>

  <div class="">
    <div class="">
      <div class="">
        <span>Notary <a class="">{{transferFrom.address}}</a></span>
        <br />
        <span>File Name (Not saved on chain) <a class="">{{notariseCreationConfirmation.file_name}}</a></span>
        <br />
        <span>File Hash <a class="">{{notariseCreationConfirmation.fileHash}} - {{notariseCreationConfirmation.hash_function}}</a></span>
        <br />
        <span>Additional Text <a class="">{{notariseCreationConfirmation.additional_text}}</a></span>
      </div>
    </div>
  </div>

  {{#if isLedgerWallet}}
  <br />
  <h4 class="text-lg font-semibold divider">
    <i class="envelope"></i>
    Message as displayed on your Ledger Nano for verification
  </h4>
  <div class="">
    <div class="">
      <div class="">
        <p style="word-wrap: break-word; word-break: break-all;">{{ledgerVerificationMessage}}</p>
      </div>
    </div>
  </div>
  {{/if}}

  <h4 class="text-lg font-semibold divider">
    <i class="file"></i>
    Transaction Details
  </h4>

  <div class="grid gap-4 grid-cols-1">
    <div class="">
      <span style="word-wrap: break-word; word-break: break-all;">Encoded Notarisation Message <a class="">{{notariseCreationConfirmation.message_hex}}</a></span>
      <br />
      <span>Fee <a class="">{{notariseCreationConfirmation.fee}}</a></span>
      <br />
      <span>OTS Key Index <a class="">{{notariseCreationConfirmation.otsKey}}</a></span>
    </div>
  </div>

  <div class="grid gap-4 md:grid-cols-2">
    <div class="text-center">
      <button id="confirmMessage" class="btn btn-lg btn-error">
        {{#if isSeedWallet}}
          Confirm Document Notarisation
        {{else}}
          Sign with Ledger
        {{/if}}
      </button>
    </div>
    <div class="text-center">
      <button id="cancelMessage" class="btn btn-lg btn-error btn-outline">Cancel Document Notarisation</button>
    </div>
  </div>

  <div id="relaying" class="alert gap-3" style="display: none;">
    <br /><br />
    <span class="loading loading-spinner loading-md"></span>
    <div class="">
      <div class="text-lg font-semibold">
        Just a moment
      </div>
      <p id="tokenRelayingMsg">Your notarisation is being relayed into the QRL network...</p>
    </div>
  </div>

</div>

<div id="transactionFailed" class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment" style="display: none;">
  <h4>Transaction Failed</h4>
  <p style="word-wrap: break-word; word-break: break-all;">
    Error! Your notarisation has failed to relay into the QRL network.<br />
    Error message: {{transactionFailed}}
  </p>
</div>

</template>
