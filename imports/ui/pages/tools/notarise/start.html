<template name="appNotariseStart">

<div class="hidden fixed inset-0 z-50 items-center justify-center bg-black/60 p-4 overflow-y-auto" id="lowOtsKeyWarning">
  <div class="text-lg font-semibold">OTS Keys Running Low!</div>
  <div class="">
    <div class="alert alert-warning gap-3"> <div class="">
        <div class="text-lg font-semibold">
          Warning: Your OTS Keys are running low.
        </div>
        <p>You only have <strong>{{otsKeysRemaining}}</strong> OTS Keys remaining. When you have used all of these, you will no longer be able to send QRL or Tokens from this wallet.</p>
        <p>It is strongly suggested that you create a new wallet, and move all your QRL and Tokens to it to ensure you do not lose access to your funds.</p>
        <p><a href="https://docs.theqrl.org/developers/ots/" target="_blank">Click here to learn what OTS Keys are.</a></p>
      </div>
    </div>
  </div>
  <div class="mt-4 flex flex-wrap justify-end gap-2 border-t border-base-300 pt-3">
    <div class="btn btn-error">Okay</div>
  </div>
</div>

<div class="hidden fixed inset-0 z-50 items-center justify-center bg-black/60 p-4 overflow-y-auto" id="invalidNodeResponse">
  <div class="text-lg font-semibold">WARNING - Bad Response</div>
  <div class="">
    <div class="alert alert-warning gap-3"> <div class="">
        <div class="text-lg font-semibold">
          WARNING - The node you've requested this transaction from replied with bad data that doesn't match your intended transaction parameters.
          <br /><br />
          This transaction has been cancelled automatically to protect your funds.
          <br /><br />
          Please report this issue through a Github issue, or directly to the QRL Team via email: info@theqrl.org
        </div>
        <p></p>
      </div>
    </div>
  </div>
  <div class="mt-4 flex flex-wrap justify-end gap-2 border-t border-base-300 pt-3">
    <div class="btn btn-error">Okay</div>
  </div>
</div>

<div class="hidden fixed inset-0 z-50 items-center justify-center bg-black/60 p-4 overflow-y-auto" id="otsKeyReuseDetected">
  <div class="text-lg font-semibold">OTS Key Reuse</div>
  <div class="">
    <div class="alert alert-warning gap-3"> <div class="">
        <div class="text-lg font-semibold">
          You have attempted to create a transaction using an OTS Key Index that has previously been used on the QRL Network.
          <br /><br />
          Please recreate your transaction using a unique OTS Key Index.
        </div>
        <p></p>
      </div>
    </div>
  </div>
  <div class="mt-4 flex flex-wrap justify-end gap-2 border-t border-base-300 pt-3">
    <div class="btn btn-success">Okay</div>
  </div>
</div>

<div class="hidden fixed inset-0 z-50 items-center justify-center bg-black/60 p-4 overflow-y-auto" id="ledgerOtsKeyReuseDetected">
  <div class="text-lg font-semibold">OTS Key Reuse</div>
  <div class="">
    <div class="alert alert-warning gap-3"> <div class="">
        <div class="text-lg font-semibold">
          You have attempted to create a transaction using an OTS Key Index that has previously been used on the QRL Network.
          <br /><br />
          You need to update your Ledgers XMSS Index in Tools -> Set XMSS Index.
        </div>
        <p></p>
      </div>
    </div>
  </div>
  <div class="mt-4 flex flex-wrap justify-end gap-2 border-t border-base-300 pt-3">
    <div class="btn btn-success">Okay</div>
  </div>
</div>

<h4 class="text-lg font-semibold pageHeader">
  <i class="edit"></i>
  <div class="">
    Notarise Document
  </div>
</h4>

<div class="rounded-xl border border-base-300 bg-base-100 p-4 text-left pageSegment" id="messageCreateForm">

  <form id="notariseForm" class="space-y-4">

    <h4 class="text-lg font-semibold dividing">Notary</h4>

    <h4 id="transferFormFromAddress" class="breakable"><a class="badge badge-outline purple">From Address</a> {{transferFrom.address}}</h4>
    <h4 class="breakable"><a class="badge badge-outline yellow">Quanta Balance</a> {{transferFrom.balance}}</h4>

    <br />
    <div class="space-y-2">
      This function will save a hash of the selected document permanently on the QRL network, and will be associated with your QRL address. You can share the resultant transaction hash with someone to prove you have notarised the document.
    </div>

    <h4 class="text-lg font-semibold divider">
      <i class="edit"></i>
      Document Notarisation
    </h4>
    <input type="hidden" id="message" autocomplete="off">

    <div class="space-y-2">
      <label>Select Document</label>
      <input type="file" id="notaryDocument" accept="text/json" name="notaryDocument[]" />
    </div>

    <div class="space-y-2">
      <label>Notarisation Hash Function</label>
      <select id="hashFunction" class="select select-bordered w-full bg-base-100">
        <option value="SHA256">SHA256</option>
      </select>
    </div>

    <div class="space-y-2">
      <label>Additional Text <i id="additional_text_max_length">(Max Length: 45)</i></label>
      <input type="text" id="additional_text" autocomplete="off">
    </div>

    <h4 class="text-lg font-semibold divider">
      <i class="send"></i>
      Transaction
    </h4>

    <div class="space-y-2">
      <label>Notarisation Fee (In Quanta)</label>
      <input type="text" id="fee" value="0.25" autocomplete="off">
    </div>

    <div class="space-y-2">
      <label>OTS Key Index</label>
      <input type="text" id="otsKey" placeholder="0" value="{{otsKeyEstimate}}" autocomplete="off" {{ledgerWalletDisabled}}>
    </div>

    <div class="space-y-2">
      <div class="alert alert-warning gap-3" style="display: inline-flex;"> <div class="">
          <div class="text-lg font-semibold">
            OTS Key Index Warning
          </div>
          {{#if isLedgerWallet}}
          <p>The <strong>OTS (One Time Signature)</strong> Key Index in the field above is based on data provided by your Ledger Device. You should <b>never</b> re-use the same OTS Key for more than 1 transaction. As you are using a Ledger Device, you can rest assured your Device will keep track of all used signatures for you. As a result, you cannot change the OTS Key that will be used to sign this transaction as the Ledger Device will automatically use the next one in line.</p>
          {{else}}
          <p>The <strong>OTS (One Time Signature)</strong> Key Index in the field above is estimated based on data provided by the QRL node you're connected to. You should <b>never</b> re-use the same OTS Key for more than 1 transaction. If you are unsure, it is safest to write down all used OTS Key Indexes, and store them in a safe place.</p>
          {{/if}}
        </div>
      </div>
    </div>

    <div class="space-y-2">
      <button id="createMessage" class="btn btn-lg btn-error" style="float: left;">Notarise Document</button>
      <br />
    </div>

    <div class="space-y-2">
      <br />
      <div id="generating" style="display: none;" class="alert gap-3">
        <span class="loading loading-spinner loading-md"></span>
        <div class="">
          <div class="text-lg font-semibold">
            Just one moment
          </div>
          <p>Notarising document...</p>
        </div>
      </div>
    </div>   

  </form>
</div>

<div id="documentNotarisationFailed" class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment" style="display: none;">
  <h4>Document Notarisation Failed</h4>
  <p style="word-wrap: break-word; word-break: break-all;">Error: {{documentNotarisationError}}</p>
</div>

</template>
