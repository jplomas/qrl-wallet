<template name="appGithubResult">

<div class="flex items-center gap-3 mb-6">
  <div class="bg-primary/20 p-3 rounded-lg">
    <img src="/img/github-w.svg" class="h-6 w-6" alt="Github">
  </div>
  <h1 class="text-2xl font-bold text-base-content">Github Message Result</h1>
</div>

<div id="transactionComplete" class="card-gradient p-4 pageSegment">

  <h4 class="text-lg font-semibold divider">
    <i class=""><img src="/img/github.svg"></i>
    Your Github operation
  </h4>

  <div class="">
    <div class="">
      <div class="image">
        {{> QRCode text=transactionHash size="128px"}}
      </div>
      <div class="">
        <div class="text-lg font-semibold">Github action</div>
        <div class="description"><p><div class="badge badge-outline">{{githubOperation.addorremove}}</div></p><p>&nbsp;</p></div>
        <div class="text-lg font-semibold">Github username [id]</div>
        <div class="description"><p>{{githubOperation.githubId}} [{{githubOperation.apiID}}]</p><p>&nbsp;</p></div>
        <div class="text-lg font-semibold">XMSS signature</div>
        <div class="description"><p style="word-break: break-all;">{{githubOperation.sigHash}}</p><p>&nbsp;</p></div>
        <div class="meta">
          <span>Transaction Hash <a  id="confirmedMessageHash" class="badge badge-outline purple" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer" href="{{nodeExplorerUrl}}/tx/{{transactionHash}}">{{transactionHash}}</a></span>
        </div>
      </div>
    </div>
  </div>

  <h4 class="text-lg font-semibold divider">
    <i class="signal"></i>
    Transaction Status
  </h4>

  <div class="grid gap-4 grid-cols-1">
    <div class="">
      <p id="successMessage" style="overflow-wrap: break-word">
        Success! Your Github message has been relayed into the QRL network through the following nodes, and is pending validation.
      </p>
    </div>
  </div>

  <div class="">
  {{#each transactionRelayedThrough}}
    <div class="">
      <span class="text-success">✔</span>
      <div class="">
        <div class="text-lg font-semibold">{{this}}</div>
      </div>
    </div>
  {{/each}}
  </div>

  <div id="relaying" class="alert gap-3">
    <br /><br />
    <span class="loading loading-spinner loading-md"></span>
    <div class="">
      <div id="loadingHeader" class="text-lg font-semibold">
        Just a moment
      </div>
      <p id="finalTxnStatus" style="word-break: break-word;">Transaction Status: {{transactionStatus}}</p>
      <div style="display: none;" id="githubInstructions">
        In order to commence signing, the Github user {{githubOperation.githubID}} needs to create a Gist with the following content:
        <div style="word-break: break-all;" class="alert bg-neutral text-neutral-content">
          {{gist}}
        </div>
      </div>
    </div>
  </div>

  <div class="grid gap-4 grid-cols-1">
    <div class="">
      <button class="btn btn-sm jsonclick">Raw Transaction Details <span aria-hidden="true">▾</span></button>
      <div class="rounded-xl border border-base-300 bg-base-100/80 p-4 raised jsonbox json unbreakable" style="display: none"></div>
    </div>
  </div>
  
</div>

</template>
