<template name="appGithubConfirm">

<dialog class="modal ledger-signing-modal" id="ledgerConfirmationModal">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">Send Github Transaction?</div>
      <div class="">
        <div class="grid gap-4">
          <div class="">
            <img class="svg" src="/img/ledger-nano.svg" />
          </div>
          <div class="">
            <div class="description pl-10">
              <p>Your transaction requires confirmation on your Ledger device. Check the details on the Ledger match those displayed below then click the sign option on your device:</p>
              <div class="container">
                <table class="table table-zebra w-full">
                  <tr>
                    <td>
                      <div class="badge badge-outline fw">FROM</div>
                    </td>
                    <td class="no-wrap">{{transferFrom.address}}</td>
                  </tr>
                  <tr>
                    <td>
                      <div class="badge badge-outline fw">MESSAGE</div>
                    </td>
                    <td class="no-wrap">
                      {{ledgerVerificationMessage}}
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <div class="badge badge-outline fw">FEE</div>
                    </td>
                    <td class="no-wrap">{{messageCreationConfirmation.fee}} Quanta</td>
                  </tr>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <div id="awaitingLedgerConfirmation" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content">
          <h3>Awaiting confirmation on Ledger device
            <div class="loading loading-spinner inline-block"></div>
          </h3>
        </div>

        <div id="signOnLedgerRejected" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content" style="display: none;">
          <h3>The Transaction has been rejected on Ledger device</h3>
          <h3 id="noRemainingSignatures" style="display: none;">There are no remaining signatures to sign a transaction with!</h3>
        </div>

        <div id="signOnLedgerTimeout" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content" style="display: none;">
          <h3>Timed out waiting for response from Ledger device. To save an OTS Key, you should reject the transaction on your Ledger device and try again.</h3>
        </div>

        <div id="signOnLedgerError" class="rounded-xl border border-base-300 bg-base-100 p-4 bg-neutral text-neutral-content" style="display: none;">
          <h3>Error communicating with Ledger device. To save an OTS Key, you should reject the transaction on your Ledger device and try again.</h3>
        </div>

        <p id="ledgerHasConfirmed" style="display:none;">Transaction signed on Ledger <span class="text-success">✔</span></p>

        <button type="button" class="btn btn-success confirm" id="relayLedgerTxnButton" style="display:none;">Send transaction</button>
        <button type="button" class="btn btn-error">Cancel</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<div class="flex items-center gap-3 mb-6">
  <div class="bg-primary/20 p-3 rounded-lg">
    <img src="/img/github-w.svg" class="h-6 w-6" alt="Github">
  </div>
  <h1 class="text-2xl font-bold text-base-content">Github Confirmation</h1>
</div>

<div id="messageCreationConfirmation" class="card-gradient p-4 pageSegment">

  <h4 class="text-lg font-semibold divider">
    <i class=""><img src="/img/github.svg"></i>
    Your Github operation
  </h4>

  <div class="">
    <div class="">
      <div class="">
        <div class="text-lg font-semibold">Github action</div>
        <div class="description"><p><div class="badge badge-outline">{{githubOperation.addorremove}}</div></p><p>&nbsp;</p></div>
        <div class="text-lg font-semibold">Github username [id]</div>
        <div class="description"><p>{{githubOperation.githubId}} [{{githubOperation.apiID}}]</p><p>&nbsp;</p></div>
        <div class="text-lg font-semibold">Github signature</div>
        <div class="description"><p>{{githubOperation.sigHash}}</p><p>&nbsp;</p></div>
      </div>
    </div>
  </div>

  {{#if isLedgerWallet}}
  <br />
  <h4 class="text-lg font-semibold divider">
    <i class="envelope"></i>
    Message as displayed on your Ledger device for verification
  </h4>
  <div class="">
    <div class="">
      <div class="">
        <p style="word-wrap: break-word; word-break: break-all;">{{ledgerVerificationMessage}}</p>
      </div>
    </div>
  </div>
  {{/if}}

  <h4 class="text-lg font-semibold divider">
    <i class="file"></i>
    Transaction Details
  </h4>

  <div class="grid gap-4 grid-cols-1">
    <div class="">
      <span>From <a class="wordBreak">{{transferFrom.address}}</a></span>
      <br />
      <span>Fee <a class="">{{messageCreationConfirmation.fee}}</a></span>
      <br />
      <span>OTS Key Index <a class="">{{messageCreationConfirmation.otsKey}}</a></span>
    </div>
  </div>

  <div class="grid gap-4 md:grid-cols-2">
    <div class="text-center">
      <button id="confirmMessage" class="btn btn-md btn-success gap-2">
        {{#if isSeedWallet}}
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        {{/if}}
        {{#if isSeedWallet}}
          Confirm Github Details
        {{else}}
          Sign with Ledger
        {{/if}}
      </button>
    </div>
    <div class="text-center">
      <button id="cancelMessage" class="btn btn-md btn-outline">Cancel Message</button>
    </div>
  </div>

  <div id="relaying" class="alert gap-3" style="display: none;">
    <br /><br />
    <span class="loading loading-spinner loading-md"></span>
    <div class="">
      <div class="text-lg font-semibold">
        Just a moment
      </div>
      <p id="tokenRelayingMsg">Your message is being relayed into the QRL network...</p>
    </div>
  </div>

</div>

<div id="transactionFailed" class="card-gradient p-4 pageSegment" style="display: none;">
  <h4>Transaction Failed</h4>
  <p style="overflow-wrap: break-word">
    Error! Your message has failed to relay into the QRL network.<br /><br />
    Error message: {{transactionFailed}}
  </p>
</div>

</template>
