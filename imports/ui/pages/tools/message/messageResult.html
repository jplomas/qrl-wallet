<template name="appMessageResult">

<h2 class="text-lg font-semibold pageHeader">
  <i class="envelope"></i>
  <div class="">
    Message Creation Result
  </div>
</h2>


<div id="transactionComplete" class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment">

  <h4 class="text-lg font-semibold divider">
    <i class="envelope"></i>
    Your Message
  </h4>

  <div class="">
    <div class="">
      <div class="image">
        {{> QRCode text=transactionHash size="128px"}}
      </div>
      <div class="">
        <a class="text-lg font-semibold" style="word-break: break-all;">{{messageDetails.message}}</a>
        <div class="meta">
          <span>Transaction Hash <a  id="confirmedMessageHash" class="badge badge-outline purple" target="_blank" href="{{nodeExplorerUrl}}/tx/{{transactionHash}}">{{transactionHash}}</a></span>
        </div>
      </div>
    </div>
  </div>

  <h4 class="text-lg font-semibold divider">
    <i class="signal"></i>
    Transaction Status
  </h4>

  <div class="grid gap-4 grid-cols-1">
    <div class="">
      <p id="successMessage" style="word-wrap: break-word; word-break: break-all;">
        Success! Your message has been relayed into the QRL network through the following nodes, and is pending validation.
      </p>
    </div>
  </div>

  <div class="">
  {{#each transactionRelayedThrough}}
    <div class="">
      <span class="text-success">✔</span>
      <div class="">
        <div class="text-lg font-semibold">{{this}}</div>
      </div>
    </div>
  {{/each}}
  </div>

  <div id="relaying" class="alert gap-3">
    <br /><br />
    <span class="loading loading-spinner loading-md"></span>
    <div class="">
      <div id="loadingHeader" class="text-lg font-semibold">
        Just a moment
      </div>
      <p id="finalTxnStatus">Transaction Status: {{transactionStatus}}</p>
    </div>
  </div>

  <div class="grid gap-4 grid-cols-1">
    <div class="">
      <button class="btn btn-sm jsonclick">Raw Transaction Details <span aria-hidden="true">▾</span></button>
      <div class="rounded-xl border border-base-300 bg-base-100 p-4 raised jsonbox json unbreakable" style="display: none"></div>
    </div>
  </div>
  
</div>

</template>
