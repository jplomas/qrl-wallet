<template name="appXmssIndexUpdate">

<div class="hidden fixed inset-0 z-50 items-center justify-center bg-black/60 p-4 overflow-y-auto" id="otsKeyReuseDetected">
  <div class="text-lg font-semibold">OTS Key Reuse</div>
  <div class="">
    <div class="alert alert-warning gap-3"> <div class="">
        <div class="text-lg font-semibold">
          You have attempted to set your Ledger Device to an OTS XMSS Index that has already been utilised.
          <br /><br />
          Please set your OTS Index to something that has not been used.
        </div>
        <p></p>
      </div>
    </div>
  </div>
  <div class="mt-4 flex flex-wrap justify-end gap-2 border-t border-base-300 pt-3">
    <div class="btn btn-success">Okay</div>
  </div>
</div>

<h2 class="text-lg font-semibold pageHeader">
  <i class="envelope"></i>
  <div class="">
    Update Ledger XMSS Index
  </div>
</h2>

<div class="rounded-xl border border-base-300 bg-base-100 p-4 text-left pageSegment" id="messageCreateForm">

  <form id="updateXmssIndexForm" class="space-y-4">

    <h4 class="text-lg font-semibold dividing">Ledger Device Details</h4>

    <h4 id="transferFormFromAddress" class="breakable"><a class="badge badge-outline purple">Ledger Address</a> {{transferFrom.address}}</h4>
    <h4 class="breakable"><a class="badge badge-outline yellow">Ledger Balance</a> {{transferFrom.balance}}</h4>
    <h4 class="breakable"><a class="badge badge-outline">Ledger App Version</a> {{ledgerAppVersion}}</h4>

    <h4 class="text-lg font-semibold divider">
      <i class="sort numeric up"></i>
      Set new XMSS Index
    </h4>

    <div class="space-y-2">
      This functionality allows you to override the XMSS index on your Ledger Device. This is useful if you're restoring an existing mnemonic seed to a new Ledger Device. Take note to never reuse existing XMSS indexes.
    </div>

    <h4 class="breakable"><a class="badge badge-outline">Ledger Device XMSS Index</a> {{currentLedgerXMSSIndex}}</h4>
    <h4 class="breakable"><a class="badge badge-outline">Suggested XMSS Index</a> {{suggestedXMSSIndex}}</h4>

    <div class="space-y-2">
      <label>New OTS Key Index</label>
      <input type="text" id="otsKey" placeholder="0" value="{{suggestedXMSSIndex}}" autocomplete="off">
    </div>

    <div class="space-y-2">
      <div class="alert alert-warning gap-3" style="display: inline-flex;"> <div class="">
          <div class="text-lg font-semibold">
            OTS Key Index Warning
          </div>
          <p>The <strong>OTS (One Time Signature)</strong> Key Index in the field above is estimated based on data provided by the QRL node you're connected to. You should <b>never</b> re-use the same OTS Key for more than 1 transaction. If you are unsure, it is safest to write down all used OTS Key Indexes, and store them in a safe place.</p>
        </div>
      </div>
    </div>

    <div class="space-y-2">
      <button id="saveXmssIndex" class="btn btn-lg btn-error" style="float: left;">Save New XMSS Index</button>
      <br />
    </div>

    <div class="space-y-2">
      <br />
      <div id="updatingLedger" style="display: none;" class="alert gap-3">
        <span class="loading loading-spinner loading-md"></span>
        <div class="">
          <div class="text-lg font-semibold">
            Ledger Confirmation
          </div>
          <p>Confirm the new XMSS index on your Ledger Device ...</p>
        </div>
      </div>
    </div>

  </form>
</div>

<div id="otsKeyUpdated" class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment" style="display: none;">
  <h4>OTS Key Index Updated Successfully</h4>
  <p style="word-wrap: break-word; word-break: break-all;">Your Ledger OTS Key Index has been updated successfully.</p>
</div>

<div id="otsKeyUpdateFailed" class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment" style="display: none;">
  <h4>OTS Key Index Update Failed</h4>
  <p style="word-wrap: break-word; word-break: break-all;">Update to your Ledger OTS Key Index Failed.</p>
</div>

</template>
