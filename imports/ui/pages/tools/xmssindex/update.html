<template name="appXmssIndexUpdate">

<dialog class="modal" id="otsKeyReuseDetected">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">OTS Key Reuse</div>
      <div class="">
        <div class="alert alert-warning gap-3"> <div class="">
            <div class="text-lg font-semibold">
              You have attempted to set your Ledger Device to an OTS XMSS Index that has already been utilised.
              <br /><br />
              Please set your OTS Index to something that has not been used.
            </div>
            <p></p>
          </div>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-success">Okay</button>
      </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<div class="flex items-center gap-3 mb-6">
  <div class="bg-primary/20 p-3 rounded-lg">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7H7v6m0 0l10-10M7 13l10 10" />
    </svg>
  </div>
  <h1 class="text-2xl font-bold text-base-content">Update Ledger XMSS Index</h1>
</div>

<div class="card-gradient text-left pageSegment" id="messageCreateForm">
  <div class="card-body">
    <form id="updateXmssIndexForm" class="space-y-6">
      <div class="grid gap-3">
        <div class="rounded-lg border border-base-300/80 bg-base-100/60 p-3">
          <p class="text-xs uppercase tracking-wide text-base-content/60">Ledger Address</p>
          <p id="transferFormFromAddress" class="break-all font-mono text-sm text-base-content">{{transferFrom.address}}</p>
        </div>
        <div class="rounded-lg border border-base-300/80 bg-base-100/60 p-3">
          <p class="text-xs uppercase tracking-wide text-base-content/60">Ledger Balance</p>
          <p class="text-sm font-semibold text-base-content">{{transferFrom.balance}}</p>
        </div>
        <div class="rounded-lg border border-base-300/80 bg-base-100/60 p-3">
          <p class="text-xs uppercase tracking-wide text-base-content/60">Ledger App Version</p>
          <p class="text-sm font-semibold text-base-content">{{ledgerAppVersion}}</p>
        </div>
      </div>

      <div class="divider text-sm font-semibold">Set New XMSS Index</div>

      <p class="text-sm text-base-content/75">
        This allows you to override the XMSS index on your Ledger Device. Use this when restoring an existing mnemonic seed to a new Ledger Device. Never reuse existing XMSS indexes.
      </p>

      <div class="grid gap-3 md:grid-cols-2">
        <div class="rounded-lg border border-base-300/80 bg-base-100/60 p-3">
          <p class="text-xs uppercase tracking-wide text-base-content/60">Ledger Device XMSS Index</p>
          <p class="text-sm font-semibold text-base-content">{{currentLedgerXMSSIndex}}</p>
        </div>
        <div class="rounded-lg border border-base-300/80 bg-base-100/60 p-3">
          <p class="text-xs uppercase tracking-wide text-base-content/60">Suggested XMSS Index</p>
          <p class="text-sm font-semibold text-base-content">{{suggestedXMSSIndex}}</p>
        </div>
      </div>

      <fieldset class="fieldset w-full">
        <legend class="fieldset-legend">New OTS Key Index</legend>
        <input type="text" id="otsKey" placeholder="0" value="{{suggestedXMSSIndex}}" autocomplete="off" class="input input-bordered w-full bg-base-100">
      </fieldset>

      <div class="alert alert-warning gap-3">
        <div>
          <div class="text-lg font-semibold">
            OTS Key Index Warning
          </div>
          <p>The <strong>OTS (One Time Signature)</strong> Key Index in the field above is estimated based on data provided by the QRL node you're connected to. You should <b>never</b> re-use the same OTS Key for more than 1 transaction. If you are unsure, it is safest to write down all used OTS Key Indexes, and store them in a safe place.</p>
        </div>
      </div>

      <div class="pt-2">
        <button id="saveXmssIndex" class="btn btn-md btn-success gap-2" type="submit">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
          Save New XMSS Index
        </button>
      </div>

      <div id="updatingLedger" style="display: none;" class="alert gap-3">
        <span class="loading loading-spinner loading-md"></span>
        <div class="">
          <div class="text-lg font-semibold">
            Ledger Confirmation
          </div>
          <p>Confirm the new XMSS index on your Ledger Device ...</p>
        </div>
      </div>
    </form>
  </div>
</div>

<div id="otsKeyUpdated" class="card-gradient p-4 pageSegment" style="display: none;">
  <h4>OTS Key Index Updated Successfully</h4>
  <p style="word-wrap: break-word; word-break: break-all;">Your Ledger OTS Key Index has been updated successfully.</p>
</div>

<div id="otsKeyUpdateFailed" class="card-gradient p-4 pageSegment" style="display: none;">
  <h4>OTS Key Index Update Failed</h4>
  <p style="word-wrap: break-word; word-break: break-all;">Update to your Ledger OTS Key Index Failed.</p>
</div>

</template>
