<template name="multisigCreate">
  <!-- error modal where weights/threshold invalid-->
  <dialog class="modal" id="checkWeightsModal">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">Multisig Wallet Generation</div>
        <div class="">
          <div class="alert alert-warning gap-3"> <div>
              <div class="text-lg font-semibold">
                Lorum ipsum
              </div>
              <p>Delit simplur</p>
            </div>
          </div>
        </div>
        <div class="modal-action">
          <button type="button" class="btn btn-error">Close</button>
        </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
  <!-- error modal where node returns invalid response  -->
  <dialog class="modal" id="invalidNodeResponse">
  <div class="modal-box wallet-modal-box">
    <div class="text-lg font-semibold">WARNING - Bad Response</div>
        <div class="">
          <div class="alert alert-warning gap-3"> <div class="">
              <div class="text-lg font-semibold">
                WARNING - The node you've requested this transaction from replied
                with bad data that doesn't match your intended transaction
                parameters.
                <br /><br />
                This transaction has been cancelled automatically to protect your
                funds.
                <br /><br />
                Please report this issue through a Github issue, or directly to the
                QRL Team via email: info@theqrl.org
              </div>
              <p></p>
            </div>
          </div>
        </div>
        <div class="modal-action">
          <button type="button" class="btn btn-success">Okay</button>
        </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

  <div id="generateTransactionArea">
    <p class="mb-4 break-all text-sm"><strong>Creator:</strong> {{ creator }}</p>
    <div class="grid gap-4 md:grid-cols-2">
      <div class="">
        <div id="transferRecipients">
          <div>
            <div class="field">
              <label class="fieldset-legend">Signatory</label>
              <div class="grid gap-2 md:grid-cols-[1fr_170px]">
                <input
                  type="text"
                  id="to_1"
                  name="to[]"
                  placeholder="Address"
                  autocomplete="off"
                  class="input input-bordered w-full bg-base-100"
                />
                <input
                  type="text"
                  id="amounts_1"
                  name="amounts[]"
                  autocomplete="off"
                  placeholder="Weight"
                  class="input input-bordered w-full bg-base-100"
                />
              </div>
            </div>
          </div>
        </div>

        <div class="space-y-2">
          <button
            id="addTransferRecipient"
            type="button"
            class="btn btn-secondary btn-sm"
            style="width: 100%"
          >
            <span aria-hidden="true">＋</span>
            Add Another Signatory
          </button>
        </div>
      </div>
      <div class="">
        <div class="space-y-4">
        <fieldset class="fieldset w-full field">
          <legend class="fieldset-legend">Threshold to spend</legend>
          <input
            type="text"
            id="threshold"
            name="threshold"
            placeholder="Threshold"
            autocomplete="off"
            class="input input-bordered w-full bg-base-100"
          />
        </fieldset>
        <fieldset class="fieldset w-full field">
          <legend class="fieldset-legend">Fee (In Quanta)</legend>
          <input
            type="text"
            id="fee"
            value="0.1"
            autocomplete="off"
            class="input input-bordered w-full bg-base-100"
          />
        </fieldset>
        <fieldset class="fieldset w-full field">
          <legend class="fieldset-legend">OTS Key Index</legend>
          <input
            type="text"
            id="otsKey"
            placeholder="0"
            value="{{ otsKeyEstimate }}"
            autocomplete="off"
            {{ledgerWalletDisabled}}
            class="input input-bordered w-full bg-base-100"
          />
        </fieldset>

        <div class="space-y-2">
          <div class="alert alert-warning gap-3" style="display: inline-flex;"> <div class="">
              <div class="text-lg font-semibold">
                OTS Key Index Warning
              </div>
              {{#if isLedgerWallet}}
              <p>
                The <strong>OTS (One Time Signature)</strong> Key Index in the
                field above is based on data provided by your Ledger Device. You
                should <b>never</b> re-use the same OTS Key for more than 1
                transaction. As you are using a Ledger Device, you can rest
                assured your Device will keep track of all used signatures for
                you. As a result, you cannot change the OTS Key that will be
                used to sign this transaction as the Ledger Device will
                automatically use the next one in line.
              </p>
              {{else}}
              <p>
                The <strong>OTS (One Time Signature)</strong> Key Index in the
                field above is estimated based on data provided by the QRL node
                you're connected to. You should <b>never</b> re-use the same OTS
                Key for more than 1 transaction. If you are unsure, it is safest
                to write down all used OTS Key Indexes, and store them in a safe
                place.
              </p>
              {{/if}}
            </div>
          </div>
        </div>

        <div class="grid gap-4 grid-cols-1">
          <div class="text-center">
            <button
              id="generateTransaction"
              class="btn btn-md btn-success gap-2"
              style="width: 100%"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
              Confirm
            </button>
          </div>
        </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Confirm Transaction Area -->
  <div id="confirmTransactionArea" style="display: none;">
    <div class="alert gap-3 transactionRecord">
      <img class="transactionTypeImage" src="/img/icons/send.svg" />
      <div class="">
        <div class="text-lg font-semibold">
          Confirm Multisig Wallet Creation
        </div>
      </div>
    </div>

    <h4 class="text-lg font-semibold divider">
      <i class="file"></i>
      Transaction Details
    </h4>

    <form>
      <div class="space-y-2">
        <h4>Signatories</h4>
        <table class="table table-zebra w-full">
          <thead><th>Address</th><th>Weight</th></thead>
          <tbody>
            {{#each transactionConfirmation.outputs}}
            <tr>
            <td>{{# if bech32}}{{ this.address_b32 }}{{else}}{{ this.address_hex
            }}{{/if}}</td>
            <td>{{ this.weight }}</td>
            </tr>
            {{/each}}
          </tbody>
          <tfoot>
            <th>Threshold for spend</th>
            <th><a class="">{{ thresholdForSpend }}</a></th>
          </tfoot>
        </table>
      </div>
    </form>

    <div class="grid gap-4 grid-cols-1">
      <div class="">
        <br />
        <span>Fee <a class="">{{ transactionConfirmationFee }}</a> Quanta</span>
        <br />
        <span>OTS Key Index
          <a class="">{{ transactionConfirmation.otsKey }}</a>
        </span>
      </div>
    </div>

    <div class="grid gap-4 grid-cols-1">
      <div class="text-center">
        <button
          id="confirmTransaction"
          class="btn btn-md btn-success gap-2"
          style="width: 100%"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
          {{#if isSeedWallet}}
          Click to Send
          {{else}}
          Sign with Ledger
          {{/if}}
        </button>
      </div>
    </div>

    <div id="relaying" class="alert gap-3" style="display: none;">
      <br /><br />
      <span class="loading loading-spinner loading-md"></span>
      <div class="">
        <div class="text-lg font-semibold">
          Just a moment
        </div>
        <p id="transferRelayingMsg">
          Your transaction is being relayed into the QRL network...
        </p>
      </div>
    </div>
  </div>
              <!-- Transaction Result Area -->
              <div id="transactionResultArea" style="display: none;">

                <div class="alert gap-3 transactionRecord">
                  <img class="transactionTypeImage" src="/img/icons/send.svg" />
                  <div class="">
                    <div class="text-lg font-semibold">
                      MultiSig Wallet Created<br><small style="word-break: break-all; text-transform: none !important;">{{msaddress}}</small>
                    </div>
                  </div>
                </div>
      
                <h4 class="text-lg font-semibold divider">
                  <i class="file"></i>
                  Transaction Details
                </h4>

                <form>
                  <div class="space-y-2">
                    <h4>Signatories</h4>
                    <table class="table table-zebra w-full">
                      <thead><th>Address</th><th>Weight</th></thead>
                      <tbody>
                        {{#each transactionConfirmation.outputs}}
                        <tr>
                        <td>{{# if bech32}}{{ this.address_b32 }}{{else}}{{ this.address_hex
                        }}{{/if}}</td>
                        <td>{{ this.weight }}</td>
                        </tr>
                        {{/each}}
                      </tbody>
                      <tfoot>
                        <th>Threshold for spend</th>
                        <th><a class="">{{ thresholdForSpend }}</a></th>
                      </tfoot>
                    </table>
                  </div>
                </form>
      
                <div class="grid gap-4 grid-cols-1">
                  <div class="">
                    <br />
                    <span>Transaction Hash <a id="confirmedTransferTxnHash" href="{{nodeExplorerUrl}}/tx/{{transactionHash}}" target="_blank" rel="noopener noreferrer nofollow" referrerpolicy="no-referrer" class="wordBreak">{{transactionHash}}</a></span>
                    <br />
                    <span>Fee <a class="">{{transactionConfirmationFee}}</a> Quanta</span>
                    <br />
                    <span>OTS Key Index <a class="">{{transactionConfirmation.otsKey}}</a></span>
                  </div>
                </div>
      
                <div class="grid gap-4 grid-cols-1">
                  <div class="">
                    <p id="transferSuccessMessage" style="word-wrap: break-word; word-break: break-all;">
                      Success! Your transaction has been relayed into the QRL network through the following nodes, and is pending validation.
                    </p>
                  </div>
                </div>
      
      
                <div class="">
                {{#each transactionRelayedThrough}}
                  <div class="">
                    <span class="text-success">✔</span>
                    <div class="">
                      <div class="text-lg font-semibold">{{this}}</div>
                    </div>
                  </div>
                {{/each}}
                </div>
      
                <div id="relaying" class="alert gap-3">
                  <br /><br />
                  <span class="loading loading-spinner loading-md"></span>
                  <div class="">
                    <div id="loadingHeader" class="text-lg font-semibold">
                      Just a moment
                    </div>
                    <p id="transferFinalTxnStatus" class="wordBreak" style="word-wrap: break-word; word-break: break-all;">Transaction Status: {{transactionStatus}}</p>
                  </div>
                </div>
      
                <div class="grid gap-4 grid-cols-1">
                  <div class="">
                    <button id="quantaJsonClick" class="btn btn-sm jsonclick">Raw Transaction Details <span aria-hidden="true">▾</span></button>
                    <div id="quantaJsonbox" class="rounded-xl border border-base-300 bg-base-100 p-4 raised jsonbox json unbreakable" style="display: none"></div>
                  </div>
                </div>
      
              </div>
</template>
