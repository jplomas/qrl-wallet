<template name="appAddTokens">
  <h1>Current Listed Tokens</h1>
    <div class="container">
    {{#if tokens}}
      <table class="table table-zebra w-full">
        <tr>
          <td>Symbol</td>
          <td>Name</td>
          <td>&nbsp;</td>
        </tr>
        {{#each tokens}}
        <tr>
          <td>{{this.symbol}}</td>
          <td>{{this.name}}</td>
          <td><button class="btn btn-error removeClick" hash="{{this.hash}}"><i class="trash" hash="{{this.hash}}"></i></button></td>
        </tr>
        {{/each}}
      </table>
    {{else}}
      <div class="container">
        <div class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment">
          <p style="color: #fff;">No tokens listed.</p>
        </div>
      </div>
    {{/if}}
  </div>
  <h1>Add Tokens by Hash</h1>
  <div class="container">
    <div class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment">
      <div class="badge badge-outline large" style="background-color: unset !important;">
        Token by Creation TxHash
      </div> 
      <div class="space-y-4">
        <div class="space-y-2">
          <input type="text" placeholder="TxHash">
        </div>
        <button class="btn btn-error">Add Token</button>
      </div>
    </div>
  </div>
  <h1>Search Chain for Tokens</h1>
  <div class="container">
    {{#if tokenSearch}}
      <table class="table table-zebra w-full">
        <tr>
          <td>Symbol</td>
          <td>Name</td>
          <td>&nbsp;</td>
        </tr>
        {{#each tokenSearch}}
        <tr>
          <td>{{this.symbol}}</td>
          <td>{{this.name}}</td>
          <td><button class="btn btn-error addClick" hash={{this.hash}}><i class="plus" hash="{{this.hash}}"></i> Add</button></td>
        </tr>
        {{/each}}
      </table>
    {{else}}
    {{#if searchItemsFound}}
    <div class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment">
      <button class="btn btn-error" id="searchButton">Search</button>
    </div>
    {{else}}
      <div class="container">
        <div class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment">
          <p style="color: #fff;">No Tokens found with balance greater than 0.</p>
        </div>
      </div>
    {{/if}}
    {{/if}}
  </div>
</template>
