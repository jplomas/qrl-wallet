<template name="appKeybaseResult">

<h2 class="text-lg font-semibold pageHeader">
  <i class=""><img src="/img/keybase-w.svg"></i>
  <div class="">
    Keybase Message Result
  </div>
</h2>


<div id="transactionComplete" class="rounded-xl border border-base-300 bg-base-100 p-4 pageSegment">

  <h4 class="text-lg font-semibold divider">
    <i class=""><img src="/img/keybase-w.svg"></i>
    Your Keybase operation
  </h4>

  <div class="">
    <div class="">
      <div class="image">
        {{> QRCode text=transactionHash size="128px"}}
      </div>
      <div class="">
        <div class="text-lg font-semibold">Keybase action</div>
        <div class="description"><p><div class="badge badge-outline">{{keybaseOperation.addorremove}}</div></p><p>&nbsp;</p></div>
        <div class="text-lg font-semibold">Keybase username</div>
        <div class="description"><p>{{keybaseOperation.keybaseId}}</p><p>&nbsp;</p></div>
        <div class="text-lg font-semibold">Keybase signature</div>
        <div class="description"><p>{{keybaseOperation.sigHash}}</p><p>&nbsp;</p></div>
        <div class="meta">
          <span>Transaction Hash <a  id="confirmedMessageHash" class="badge badge-outline purple" target="_blank" href="{{nodeExplorerUrl}}/tx/{{transactionHash}}">{{transactionHash}}</a></span>
        </div>
      </div>
    </div>
  </div>

  <h4 class="text-lg font-semibold divider">
    <i class="signal"></i>
    Transaction Status
  </h4>

  <div class="grid gap-4 grid-cols-1">
    <div class="">
      <p id="successMessage" style="overflow-wrap: break-word">
        Success! Your Keybase message has been relayed into the QRL network through the following nodes, and is pending validation.
      </p>
    </div>
  </div>

  <div class="">
  {{#each transactionRelayedThrough}}
    <div class="">
      <span class="text-success">✔</span>
      <div class="">
        <div class="text-lg font-semibold">{{this}}</div>
      </div>
    </div>
  {{/each}}
  </div>

  <div id="relaying" class="alert gap-3">
    <br /><br />
    <span class="loading loading-spinner loading-md"></span>
    <div class="">
      <div id="loadingHeader" class="text-lg font-semibold">
        Just a moment
      </div>
      <p id="finalTxnStatus" style="word-break: break-word;">Transaction Status: {{transactionStatus}}</p>
    </div>
  </div>

  <div class="grid gap-4 grid-cols-1">
    <div class="">
      <button class="btn btn-sm jsonclick">Raw Transaction Details <span aria-hidden="true">▾</span></button>
      <div class="rounded-xl border border-base-300 bg-base-100 p-4 raised jsonbox json unbreakable" style="display: none"></div>
    </div>
  </div>
  
</div>

</template>
